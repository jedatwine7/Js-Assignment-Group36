<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page (Product Listing)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav style="display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: #333; color: white;">
        <div class="logo" style="font-weight: bold; font-size: 1.2rem;">My Shop</div>
        
        <input type="text" 
               id="search-bar" 
               placeholder="Search products..." 
               onkeyup="searchProducts()" 
               style="padding: 8px; width: 40%; border-radius: 4px; border: none;">

        <a href="cart.html" style="color: white; text-decoration: none; display: flex; align-items: center;">
            <span style="margin-right: 5px;"></span>
            <div id="cart-counter">Cart (0)</div>
        </a>
    </nav>

    <div id="product-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px;">
        </div>

    <script src="script.js"></script>
</body>
</html>
