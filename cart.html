<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Shopping Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav style="display: flex; justify-content: space-between; padding: 20px; background: #333; color: white;">
        <div class="logo"><a href="index.html" style="color:white; text-decoration:none;">← Back to Shop</a></div>
        <div id="cart-counter">Cart (0)</div>
    </nav>

    <div style="padding: 40px; max-width: 800px; margin: auto;">
        <h1>Your Shopping Cart</h1>
        
        <div id="cart-container"></div>
        
        <div style="margin-top: 30px; border-top: 2px solid #333; padding-top: 20px;">
            <h2 id="total-price">Total: UGX 0</h2>
            <br>
            <a href="checkout.html" style="background: #28a745; color: white; padding: 15px 30px; text-decoration: none; border-radius: 5px; font-weight: bold;">
                Proceed to Checkout
            </a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
